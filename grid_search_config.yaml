preprocessing:
  - GeminiMarkdownProcessor

chunking:
  - name: FixedParagraphChunker
    options:
      chunk_sizes: [1, 2, 3]
      overlaps: [0, 1]

  - name: FixedCharacterChunker
    options:
      chunk_sizes: [200, 300, 500]
      overlaps: [0, 50]

  # - name: DynamicTokenChunker
