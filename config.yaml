data:
  documents:
    - "documents/PO.pdf"
    - "documents/MHB.pdf"
  evaluation_file: "storage/evaluation/qa_pairs_grid.json"
  index_path: "storage/index"

# --- NEW: Config Overrides ---
offline_config:
  embedding_model: "storage/models/jina-embeddings"

online_config:
  top_k: 15
  top_n: 5

# --- Pipeline Components ---
offline_pipeline:
  preprocessors:
    - "GeminiMarkdownProcessor"
    - "DirectLLMProcessor"
  chunker: "FixedParagraphChunker"
  index_builder: "FaissIndexBuilder"

online_pipeline:
  query_processor: "NoProcessingProcessor"
  retriever: "FaissRetriever"
  reranker: "PassthroughReranker"
  generator: "PassthroughGenerator"