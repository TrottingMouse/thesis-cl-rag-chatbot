documents:
  - "documents/PO.pdf"
  - "documents/MHB.pdf"

offline_config:
  embedding_model: "storage/models/jina-embeddings"
  chunking_params: {}   # e.g. {chunk_size: 400, overlap: 50} for FixedParagraphChunker

online_config:
  top_k: 15
  top_n: 5
  generation_model: "Qwen/Qwen3.5-0.8B"

# --- Pipeline Components ---
offline_pipeline:
  preprocessors:
    - "GeminiMarkdownProcessor"
    - "DirectLLMProcessor"
  chunker: "FixedParagraphChunker"
  index_builder: "FaissIndexBuilder"

online_pipeline:
  query_processor: "NoProcessingProcessor"
  retriever: "FaissRetriever"
  reranker: "PassthroughReranker"
  generator: "HuggingfaceGenerator"