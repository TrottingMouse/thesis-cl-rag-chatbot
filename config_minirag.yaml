# MiniRAG pipeline configuration
# Run with: python main.py (after pointing main.py at this file, or copying these values to config.yaml)

pipeline_mode: minirag

documents:
  - "documents/PO.pdf"
  - "documents/MHB.pdf"

offline_config:
  embedding_model: "storage/models/jina-embeddings"
  preprocessors:
    - "GeminiMarkdownProcessor"
    - "DirectLLMProcessor"

online_config:
  generation_model: "Qwen/Qwen3.5-0.8B"

minirag_config:
  working_dir: "storage/minirag_index"
  query_mode: "mini"      # "mini" (graph-guided) | "light" (hybrid) | "naive" (pure vector)
  embedding_dim: 768      # hidden_size of jina-embeddings (jina_embeddings_v5)
  chunk_token_size: 1200  # approximate token budget per chunk
